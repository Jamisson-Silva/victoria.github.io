<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Você ❤️</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

    <style>
        /* --- ESTILIZAÇÃO --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* Fundo Azul Escuro Profundo e Preto */
            background: linear-gradient(135deg, #001f3f 0%, #000000 100%);
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            color: #ffffff;
        }

        .container {
            /* Painel Preto Translúcido com borda Azul */
            background-color: rgba(0, 0, 0, 0.7);
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 15px 40px rgba(0, 116, 217, 0.3);
            text-align: center;
            z-index: 10;
            max-width: 90%;
            width: 450px;
            border: 1px solid #0074d9;
            backdrop-filter: blur(5px); /* Efeito de vidro fosco */
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 2.8rem;
            color: #7fdbff; /* Azul Ciano Claro para destaque */
            margin-bottom: 15px;
            text-shadow: 2px 2px 10px rgba(0, 116, 217, 0.5);
        }

        /* Moldura da Foto */
        .moldura {
            width: 100%;
            height: 350px;
            border-radius: 20px;
            overflow: hidden;
            border: 4px solid #001f3f;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            margin-bottom: 20px;
            background-color: #111;
        }

        .moldura img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.8s ease-in-out;
        }

        .btn-play {
            background: #0074d9; /* Azul Royal */
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0, 116, 217, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-play:hover {
            transform: translateY(-3px);
            background: #7fdbff;
            color: #001f3f;
            box-shadow: 0 6px 20px rgba(127, 219, 255, 0.6);
        }

        /* Corações/Estrelas Caindo */
        .heart {
            position: fixed;
            top: -10%;
            font-size: 20px;
            user-select: none;
            pointer-events: none;
            z-index: 1;
            animation: fall linear forwards;
            filter: drop-shadow(0 0 5px rgba(127, 219, 255, 0.8));
        }

        @keyframes fall {
            to {
                transform: translateY(110vh) rotate(360deg);
            }
        }

        p.subtitulo {
            margin-bottom: 20px; 
            font-style: italic; 
            color: #aaaaaa;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Nossa História ❤️</h1>
        
        <div class="moldura">
            <img src="foto1.jpg" id="slide" alt="Nossa Foto">
        </div>

        <p class="subtitulo">
            Sob as estrelas e em todos os momentos.
        </p>

        <button class="btn-play" id="playBtn">Tocar nossa trilha 🎵</button>
    </div>

    <audio id="musica" loop>
        <source src="musica.mp3" type="audio/mpeg">
    </audio>

    <script>
        /* --- LÓGICA --- */

        // 1. LISTA DE FOTOS (Mantenha os arquivos na mesma pasta do GitHub)
        const fotos = [
            'foto1.jpg',
            'foto2.jpg',
            'foto3.jpg'
        ];
        
        let index = 0;
        const imgElement = document.getElementById('slide');
        const btn = document.getElementById('playBtn');
        const musica = document.getElementById('musica');

        function slideShow() {
            if(fotos.length <= 1) return;
            index++;
            if (index >= fotos.length) index = 0;
            
            imgElement.style.opacity = '0';
            
            setTimeout(() => {
                imgElement.src = fotos[index];
                imgElement.style.opacity = '1';
            }, 800);
        }

        setInterval(slideShow, 4000);

        // Função dos corações (Ajustados para tons de azul e branco)
        function criarCoracao() {
            const h = document.createElement('div');
            h.classList.add('heart');
            // Mix de corações azuis, brancos e emojis brilhantes
            h.innerHTML = ['💙','✨','❄️','🤍'][Math.floor(Math.random() * 4)];
            h.style.left = Math.random() * 100 + "vw";
            h.style.animationDuration = Math.random() * 3 + 2 + "s";
            h.style.opacity = Math.random();
            h.style.fontSize = Math.random() * 15 + 15 + "px";
            document.body.appendChild(h);

            setTimeout(() => { h.remove(); }, 5000);
        }

        btn.addEventListener('click', () => {
            if (musica.paused) {
                musica.play();
                btn.innerHTML = "Tocando... 💙";
                btn.style.background = "#2ecc40"; // Verde discreto ao tocar
                setInterval(criarCoracao, 300);
            } else {
                musica.pause();
                btn.innerHTML = "Continuar? 🎵";
                btn.style.background = "#0074d9";
            }
        });
    </script>
</body>
</html>
